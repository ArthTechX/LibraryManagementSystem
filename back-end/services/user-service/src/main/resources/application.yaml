
server:
  port: ${PORT:5001}

spring:
  application:
    name: user-service

  # Disable SQL script init — data seeded programmatically via DataInitializer.java
  sql:
    init:
      mode: never

  # H2 In-Memory Database (default dev profile)
  datasource:
    url: jdbc:h2:mem:lmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console (for debugging at http://localhost:5001/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  # Jackson
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    time-zone: UTC

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:LMSSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration1234567890ABCDEF}
    expiration: ${JWT_EXPIRATION:86400000}

# Logging
logging:
  level:
    root: INFO
    com.habeebcycle: DEBUG
    org.hibernate.SQL: WARN

# Actuator
management:
  endpoint:
    health:
      show-details: "ALWAYS"
  endpoints:
    web:
      exposure:
        include: "health,info"

---
# Production profile (PostgreSQL on Railway/Render/etc.)
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/lmsdb}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}
